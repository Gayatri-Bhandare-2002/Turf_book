{% extends 'bookings/base.html' %} {% block title %}Login — TurfZone{% endblock
%} {% block content %}
<div class="container" style="max-width: 450px; padding-top: 3rem">
  <div class="card">
    <div class="card-header"><h2>🔐 User Login</h2></div>
    <div class="card-body">
      {% if messages %} {% for msg in messages %}
      <div class="alert alert-error">{{ msg }}</div>
      {% endfor %} {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">
          Login
        </button>
      </form>
      <p style="text-align: center; margin-top: 1rem">
        Account nahi hai? <a href="{% url 'user_register' %}">Register karo</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
